<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Sajdah Tracker Legend</title>
    <meta name="theme-color" content="#d4af37">
    <meta name="description" content="Jejak hafazan al-Quran dengan sistem gamifikasi legend">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Al-Sajdah">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0a0e14;
            --gold: #d4af37;
            --gold-light: #f7d97b;
            --text-color: #ffffff;
            --card-bg: #1a1f26;
            --card-hover: #232a33;
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --gold-rank: #ffd700;
            --diamond: #4fc3f7;
            --legend: #ab47bc;
            --mythic: #ff3d7f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(171, 71, 188, 0.08) 0%, transparent 50%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header { 
            text-align: center; 
            border-bottom: 2px solid var(--gold); 
            padding-bottom: 20px; 
            margin-bottom: 25px;
            position: relative;
        }
        h1 {
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: shine 3s linear infinite;
            font-size: 2em;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .subtitle { color: #888; font-size: 0.9em; margin-top: 5px; }

        /* Auth Status Bar */
        .auth-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75em;
        }
        .auth-status {
            color: var(--gold);
            font-weight: 600;
        }
        .btn-auth {
            padding: 6px 12px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-auth:hover {
            background: var(--gold);
            color: #000;
        }
        .btn-auth.logout {
            border-color: #ff3b30;
            color: #ff3b30;
        }
        .btn-auth.logout:hover {
            background: #ff3b30;
            color: #fff;
        }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-box { background: var(--card-bg); border: 1px solid #2a323d; border-radius: 10px; padding: 15px; text-align: center; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: var(--gold); }
        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-box {
            flex: 1; min-width: 200px; padding: 10px 15px; background: var(--card-bg);
            border: 1px solid var(--gold); border-radius: 25px; color: var(--text-color);
            font-size: 0.95em; outline: none; transition: all 0.3s;
        }
        .search-box:focus { box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-btn {
            padding: 8px 14px; background: var(--card-bg); border: 1px solid #2a323d;
            border-radius: 20px; color: var(--text-color); cursor: pointer; font-size: 0.8em; font-weight: bold; transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--gold); }
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        #refreshBtn {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold);
            background: var(--card-bg); color: var(--gold); font-size: 1.2em;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        #refreshBtn:hover { background: var(--gold); color: #000; transform: rotate(180deg); }

        .card-murid {
            background: var(--card-bg); border: 2px solid #2a323d; border-radius: 15px;
            padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: all 0.3s; animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-murid:hover { background: var(--card-hover); transform: translateX(5px); border-color: var(--gold); }
        .card-murid.rank-mythic { border-color: var(--mythic); box-shadow: 0 0 20px rgba(255, 61, 127, 0.3); animation: fadeIn 0.5s ease-out, mythicPulse 2s ease-in-out infinite; }
        @keyframes mythicPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 61, 127, 0.3); } 50% { box-shadow: 0 0 30px rgba(255, 61, 127, 0.6); } }
        .card-murid.rank-legend { border-color: var(--legend); box-shadow: 0 0 15px rgba(171, 71, 188, 0.25); }
        .card-murid.rank-diamond { border-color: var(--diamond); }

        .avatar {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.4em; color: #000; flex-shrink: 0;
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            overflow: hidden; position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .progress-container { flex-grow: 1; min-width: 0; }
        .name-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
        .murid-name { font-weight: bold; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .rank-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; letter-spacing: 1px; color: #000; text-transform: uppercase; }
        .rank-bronze { background: var(--bronze); } .rank-silver { background: var(--silver); }
        .rank-gold { background: var(--gold-rank); } .rank-diamond { background: var(--diamond); }
        .rank-legend { background: var(--legend); color: #fff; }
        .rank-mythic { background: linear-gradient(90deg, var(--mythic), #ff8fa3, var(--mythic)); background-size: 200% auto; color: #fff; animation: shine 2s linear infinite; }

        .bar-bg { background: #000; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease-out; position: relative; }
        .bar-bronze { background: linear-gradient(90deg, #8b4513, var(--bronze)); }
        .bar-silver { background: linear-gradient(90deg, #808080, var(--silver)); }
        .bar-gold { background: linear-gradient(90deg, #b8860b, var(--gold-rank)); }
        .bar-diamond { background: linear-gradient(90deg, #0288d1, var(--diamond)); }
        .bar-legend { background: linear-gradient(90deg, #7b1fa2, var(--legend)); }
        .bar-mythic { background: linear-gradient(90deg, var(--mythic), #ff8fa3, var(--mythic)); background-size: 200% auto; animation: shine 2s linear infinite; }
        .bar-mythic::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .info-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.8em; color: #aaa; flex-wrap: wrap; gap: 8px; }
        .stats-mini span { margin-right: 10px; }

        .galaxy-container {
            position: relative;
            width: 100%;
            height: 80px;
            background: radial-gradient(ellipse at center, #0f1318 0%, #000 100%);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #2a323d;
        }
        .galaxy-star {
            position: absolute; width: 4px; height: 4px; background: var(--gold);
            border-radius: 50%; box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-light);
            animation: starGlow 2s ease-in-out infinite;
        }
        .galaxy-star.large {
            width: 6px; height: 6px; background: var(--gold-light);
            box-shadow: 0 0 8px var(--gold), 0 0 16px var(--gold-light), 0 0 24px var(--gold);
        }
        .galaxy-star::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 20px; height: 20px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        @keyframes starGlow { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
        .galaxy-line {
            position: absolute; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transform-origin: left center; opacity: 0.3;
        }
        .galaxy-count {
            position: absolute; bottom: 5px; right: 10px;
            font-size: 0.75em; color: var(--gold); font-weight: bold;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.3s; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; max-width: 450px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--gold); font-size: 1.5em; cursor: pointer; }
        .modal-header { text-align: center; margin-bottom: 20px; }

        .modal-avatar {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; font-weight: bold; color: #000;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: 3px solid var(--gold); overflow: hidden; position: relative;
            cursor: pointer; transition: transform 0.3s;
        }
        .modal-avatar:hover { transform: scale(1.05); }
        .modal-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-avatar .upload-hint {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7); color: var(--gold); font-size: 0.35em;
            padding: 6px; text-align: center; opacity: 0; transition: opacity 0.3s;
        }
        .modal-avatar:hover .upload-hint { opacity: 1; }

        /* Guest mode - hide upload hint */
        .modal-avatar.guest { cursor: default; }
        .modal-avatar.guest:hover { transform: none; }
        .modal-avatar.guest .upload-hint { display: none; }

        .modal-name { font-size: 1.4em; color: var(--gold); margin: 5px 0; }
        .modal-class { color: #888; font-size: 0.9em; }
        .modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .modal-stat { background: #0f1318; padding: 12px; border-radius: 10px; text-align: center; }
        .modal-stat-value { font-size: 1.3em; font-weight: bold; color: var(--gold); }
        .modal-stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; }
        .badges-section h3 { color: var(--gold); font-size: 0.95em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .badges-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge-item { background: #0f1318; padding: 6px 12px; border-radius: 15px; font-size: 0.85em; border: 1px solid #2a323d; }
        .empty-state { text-align: center; padding: 40px; color: #666; }

        .btn-action {
            width: 100%; padding: 10px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; font-size: 0.9em; margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-add-star { background: var(--gold); color: #000; }
        .btn-add-star:hover { background: var(--gold-light); transform: scale(1.02); }
        .btn-streak { background: linear-gradient(135deg, #ff4500, #ff8c00); color: #fff; }
        .btn-streak:hover { background: linear-gradient(135deg, #ff8c00, #ffd700); transform: scale(1.02); }
        .btn-delete { background: #8b0000; color: #fff; }
        .btn-delete:hover { background: #a00000; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Hide action buttons for guests */
        .btn-action.guest-only { display: none; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 20px;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid var(--gold);
            border-top-color: transparent; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--gold); font-size: 1.2em; }

        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); border: 2px solid var(--gold);
            color: var(--text-color); padding: 12px 24px; border-radius: 10px;
            z-index: 10000; animation: slideUp 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Login Modal */
        .login-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-overlay.active { display: flex; }
        .login-box {
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
        }
        .login-box h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .login-field {
            margin-bottom: 15px;
        }
        .login-field label {
            display: block;
            color: var(--gold);
            font-size: 0.85em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .login-field input {
            width: 100%;
            padding: 12px;
            background: #0f1318;
            border: 1px solid #2a323d;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1em;
            outline: none;
        }
        .login-field input:focus { border-color: var(--gold); }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-error {
            background: #8b0000;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            display: none;
        }
        .login-error.show { display: block; }
        .login-switch {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85em;
            color: #888;
        }
        .login-switch a {
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            body { padding: 12px; } h1 { font-size: 1.4em; }
            .avatar { width: 50px; height: 50px; font-size: 1.1em; }
            .card-murid { padding: 14px; gap: 12px; }
            .modal-avatar { width: 100px; height: 100px; font-size: 2em; }
            .galaxy-container { height: 60px; }
            .auth-bar { position: static; margin-top: 10px; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Memuatkan data...</div>
    </div>

    <header>
        <h1>Al-Sajdah Legend</h1>
        <p class="subtitle">Jejak Hafazan • Dashboard</p>
        <div class="auth-bar" id="authBar">
            <!-- Auth buttons will be inserted here -->
        </div>
    </header>

    <div class="stats-row" id="statsRow"></div>

    <div class="controls">
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Cari nama murid...">
        <button id="refreshBtn" onclick="refreshData()" title="Muat semula data">🔄</button>
        <div class="filter-group" id="filterGroup">
            <button class="filter-btn active" data-rank="all">Semua</button>
            <button class="filter-btn" data-rank="mythic">Mythic</button>
            <button class="filter-btn" data-rank="legend">Legend</button>
            <button class="filter-btn" data-rank="diamond">Diamond</button>
            <button class="filter-btn" data-rank="gold">Gold</button>
            <button class="filter-btn" data-rank="silver">Silver</button>
            <button class="filter-btn" data-rank="bronze">Bronze</button>
        </div>
    </div>

    <div id="muridList"></div>

    <!-- Modal Detail Murid -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Login/Register Modal -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 id="loginTitle">🔐 Login Guru</h2>
            <div class="login-error" id="loginError"></div>
            
            <div id="loginForm">
                <div class="login-field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="guru@sekolah.edu.my">
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-login" id="btnLoginSubmit" onclick="handleLogin()">Login</button>
                <div class="login-switch">
                    Belum ada akaun? <a onclick="showRegister()">Daftar di sini</a>
                </div>
            </div>

            <div id="registerForm" style="display: none;">
                <div class="login-field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="guru@sekolah.edu.my">
                </div>
                <div class="login-field">
                    <label>Password (min 6 aksara)</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <button class="btn-login" id="btnRegSubmit" onclick="handleRegister()">Daftar Akaun</button>
                <div class="login-switch">
                    Sudah ada akaun? <a onclick="showLogin()">Login di sini</a>
                </div>
            </div>

            <div class="login-switch" style="margin-top: 20px;">
                <a onclick="closeLoginModal()">← Kembali ke Dashboard</a>
            </div>
        </div>
    </div>

    <input type="file" id="fotoInput" accept="image/*" style="display: none;">

    <script>
        // ===== SUPABASE CONFIG =====
        const SUPABASE_URL = 'https://ajhmwbuxtehkqoqlgqfc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaG13YnV4dGVoa3FvcWxncWZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTI1MDksImV4cCI6MjA5OTY4ODUwOX0.KH31HCi4Vf0V1XTljb_XRCG8DHNs9veL-tJ_lOvbgAE';
        const TABLE_NAME = 'hafazan_records';
        const STORAGE_BUCKET = 'foto-murid';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== AUTH STATE =====
        let currentUser = null;
        let isLoggedIn = false;

        // Check auth status on load
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                isLoggedIn = true;
            }
            updateAuthUI();
        }

        // Listen to auth changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                currentUser = session.user;
                isLoggedIn = true;
                showToast('✅ Login berjaya! Selamat datang, ' + currentUser.email);
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                isLoggedIn = false;
                showToast('👋 Anda telah logout');
            }
            updateAuthUI();
            // Re-render modal if open
            if (currentModalIndex !== null) {
                showModal(currentModalIndex);
            }
        });

        function updateAuthUI() {
            const authBar = document.getElementById('authBar');
            if (isLoggedIn && currentUser) {
                const email = currentUser.email;
                const shortEmail = email.length > 20 ? email.substring(0, 20) + '...' : email;
                authBar.innerHTML = `
                    <span class="auth-status">👤 ${shortEmail}</span>
                    <button class="btn-auth logout" onclick="handleLogout()">Logout</button>
                `;
            } else {
                authBar.innerHTML = `
                    <button class="btn-auth" onclick="showLoginModal()">🔐 Login Guru</button>
                `;
            }
        }

        // ===== AUTH FUNCTIONS =====
        function showLoginModal() {
            document.getElementById('loginOverlay').classList.add('active');
            showLogin();
        }

        function closeLoginModal() {
            document.getElementById('loginOverlay').classList.remove('active');
            document.getElementById('loginError').classList.remove('show');
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTitle').textContent = '🔐 Login Guru';
            document.getElementById('btnLoginSubmit').textContent = 'Login';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginTitle').textContent = '📝 Daftar Akaun Guru';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLoginSubmit');
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Sila masukkan email dan password';
                errorDiv.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorDiv.classList.remove('show');

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                closeLoginModal();
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch (err) {
                errorDiv.textContent = 'Login gagal: ' + err.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        async function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('btnRegSubmit');
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Sila masukkan email dan password';
                errorDiv.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password mesti sekurang-kurangnya 6 aksara';
                errorDiv.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Mendaftar...';
            errorDiv.classList.remove('show');

            try {
                const { error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                errorDiv.style.background = '#1B7A3A';
                errorDiv.textContent = '✅ Pendaftaran berjaya! Sila check email untuk verification link.';
                errorDiv.classList.add('show');
                
                setTimeout(() => {
                    showLogin();
                    errorDiv.style.background = '#8b0000';
                    errorDiv.classList.remove('show');
                }, 3000);

            } catch (err) {
                errorDiv.textContent = 'Pendaftaran gagal: ' + err.message;
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Daftar Akaun';
            }
        }

        async function handleLogout() {
            if (confirm('Logout dari sistem?')) {
                await supabaseClient.auth.signOut();
            }
        }

        // Close login modal on outside click
        document.getElementById('loginOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'loginOverlay') closeLoginModal();
        });

        // Enter key for login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('loginOverlay').classList.contains('active')) {
                    if (document.getElementById('loginForm').style.display !== 'none') {
                        handleLogin();
                    } else {
                        handleRegister();
                    }
                }
            }
        });

        // ===== DATA MURID =====
        let muridData = [];
        let currentModalIndex = null;
        const fotoInput = document.getElementById('fotoInput');

        // ===== FUNGSI ASAS =====
        function getRank(peratus) {
            if (peratus >= 96) return { name: "MYTHIC", class: "mythic" };
            if (peratus >= 81) return { name: "LEGEND", class: "legend" };
            if (peratus >= 61) return { name: "DIAMOND", class: "diamond" };
            if (peratus >= 41) return { name: "GOLD", class: "gold" };
            if (peratus >= 21) return { name: "SILVER", class: "silver" };
            return { name: "BRONZE", class: "bronze" };
        }

        function getInitial(nama) {
            return nama.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
        }

        function formatSurahAyat(m) {
            const surah = (m.surah && m.surah !== '-') ? m.surah : '';
            const lastAyat = (m.last_ayat && m.last_ayat !== '-') ? m.last_ayat : '';
            if (surah && lastAyat) return surah + ' (Ayat ' + lastAyat + ')';
            if (lastAyat) return 'Ayat ' + lastAyat;
            if (surah) return surah;
            return m.ayat && m.ayat !== '-' ? 'Ayat ' + m.ayat : '-';
        }

        function showToast(message, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function normalizeData(data) {
            return data.map(row => ({
                id: row.id,
                nama: row.nama_murid || row.nama || 'Tanpa Nama',
                kelas: row.kelas || '-',
                surah: row.surah || '-',
                ayat: row.ayat || '-',
                last_ayat: row.last_ayat || '-',
                peratus: row.peratus || 0,
                streak: row.streak || 0,
                xp: row.xp || 0,
                bintang: row.bintang || 0,
                foto_url: row.foto_url,
                tarikh: row.tarikh || null,
                lencana: Array.isArray(row.lencana) 
                    ? row.lencana 
                    : (typeof row.lencana === 'string' ? JSON.parse(row.lencana) : [])
            }));
        }

        // ===== LOAD DATA DARI SUPABASE =====
        async function loadMuridData() {
            showLoading(true);
            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .order('peratus', { ascending: false });
                
                if (error) throw error;
                
                muridData = normalizeData(data || []);
                
                if (muridData.length === 0) {
                    await seedDefaultData();
                }
                
                renderStats();
                applyFilters();
            } catch (error) {
                console.error('Error loading data:', error);
                showToast('❌ Gagal memuatkan data: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        async function seedDefaultData() {
            const defaultData = [
                { nama_murid: "Ahmad bin Ali", kelas: "4 Ar-Rahman", surah: "Al-Baqarah", peratus: 98, streak: 45, xp: 2850, bintang: 42, lencana: ["🏆 Hafiz Muda", "🔥 Streak Master", "⭐ Top 3"] },
                { nama_murid: "Siti Aisyah binti Hassan", kelas: "5 Al-Furqan", surah: "Ali 'Imran", peratus: 92, streak: 30, xp: 2400, bintang: 35, lencana: ["💎 Diamond Hafiz", "🔥 Streak Master"] }
            ];

            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .insert(defaultData)
                    .select();

                if (error) throw error;

                muridData = normalizeData(data);
                renderStats();
                applyFilters();
                showToast('✅ Data default berjaya dimuatkan');
            } catch (error) {
                console.error('Error seeding data:', error);
                showToast('❌ Gagal muat data default: ' + error.message);
            }
        }

        // ===== REFRESH DATA =====
        async function refreshData() {
            showLoading(true);
            try {
                await loadMuridData();
            } finally {
                showLoading(false);
            }
        }

        // ===== REALTIME SUBSCRIPTION =====
        function setupRealtime() {
            const channel = supabaseClient
                .channel('hafazan-realtime')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: TABLE_NAME },
                    (payload) => {
                        console.log('[Realtime] Data berubah:', payload.eventType);
                        refreshData();
                    }
                )
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        console.log('[Realtime] Berlangganan ke hafazan_records');
                    } else if (status === 'CHANNEL_ERROR') {
                        console.warn('[Realtime] Ralat langganan - dashboard tidak akan auto-kemaskini');
                        showToast('⚠️ Auto-update rosak. Sila muat semula halaman.');
                    }
                });
        }

        // ===== RENDER AVATAR =====
        function renderAvatar(murid) {
            const initial = getInitial(murid.nama);
            if (murid.foto_url) {
                return `<div class="avatar"><img src="${murid.foto_url}" alt="${murid.nama}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='${initial}'"></div>`;
            }
            return `<div class="avatar">${initial}</div>`;
        }

        // ===== RENDER GALAXY BINTANG =====
        function renderGalaxy(bintangCount) {
            const maxStars = Math.min(bintangCount, 30);
            let html = '<div class="galaxy-container">';
            
            const starPositions = [];
            for (let i = 0; i < maxStars; i++) {
                const x = Math.random() * 90 + 5;
                const y = Math.random() * 70 + 10;
                const isLarge = i < 3;
                const delay = Math.random() * 2;
                
                starPositions.push({ x, y });
                html += `<div class="galaxy-star ${isLarge ? 'large' : ''}" style="left: ${x}%; top: ${y}%; animation-delay: ${delay}s;"></div>`;
            }
            
            for (let i = 0; i < starPositions.length - 1; i++) {
                for (let j = i + 1; j < starPositions.length; j++) {
                    const dx = starPositions[j].x - starPositions[i].x;
                    const dy = starPositions[j].y - starPositions[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 25) {
                        const length = distance;
                        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                        html += `<div class="galaxy-line" style="left: ${starPositions[i].x}%; top: ${starPositions[i].y}%; width: ${length}%; transform: rotate(${angle}deg);"></div>`;
                    }
                }
            }
            
            html += `<div class="galaxy-count">⭐ ${bintangCount} Bintang</div></div>`;
            return html;
        }

        // ===== RENDER SENARAI =====
        function renderMurid(list) {
            const container = document.getElementById('muridList');
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">Tiada murid ditemui 📭</div>';
                return;
            }
            container.innerHTML = list.map((m, i) => {
                const rank = getRank(m.peratus);
                const originalIndex = muridData.findIndex(x => x.id === m.id);
                return `
                    <div class="card-murid rank-${rank.class}" onclick="showModal(${originalIndex})" style="animation-delay: ${i * 0.05}s">
                        ${renderAvatar(m)}
                        <div class="progress-container">
                            <div class="name-row">
                                <span class="murid-name">${m.nama}</span>
                                <span class="rank-badge rank-${rank.class}">${rank.name}</span>
                            </div>
                            <div class="bar-bg">
                                <div class="bar-fill bar-${rank.class}" style="width: ${m.peratus}%"></div>
                            </div>
                            <div class="info-row">
                                <span> 📖 ${formatSurahAyat(m)}</span>
                                <span class="stats-mini">
                                    <span>⭐ ${m.bintang}</span>
                                    <span>🔥 ${m.streak}</span>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== RENDER STATISTIK =====
        function renderStats() {
            const total = muridData.length;
            const avg = total > 0 ? Math.round(muridData.reduce((s, m) => s + m.peratus, 0) / total) : 0;
            const topStreak = total > 0 ? Math.max(...muridData.map(m => m.streak)) : 0;
            const mythicCount = muridData.filter(m => m.peratus >= 96).length;
            const totalBintang = muridData.reduce((s, m) => s + m.bintang, 0);

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-box"><div class="stat-value">${total}</div><div class="stat-label">Jumlah Murid</div></div>
                <div class="stat-box"><div class="stat-value">${avg}%</div><div class="stat-label">Purata Hafazan</div></div>
                <div class="stat-box"><div class="stat-value">⭐ ${totalBintang}</div><div class="stat-label">Total Bintang</div></div>
                <div class="stat-box"><div class="stat-value">${mythicCount}</div><div class="stat-label">Mythic Rank</div></div>
                <div class="stat-box"><div class="stat-value">🔥 ${topStreak}</div><div class="stat-label">Top Streak</div></div>
            `;
        }

        // ===== MODAL =====
        function showModal(index) {
            currentModalIndex = index;
            const m = muridData[index];
            const rank = getRank(m.peratus);
            const initial = getInitial(m.nama);

            // Determine if user can edit
            const canEdit = isLoggedIn;
            const avatarClass = canEdit ? '' : 'guest';
            const actionBtnClass = canEdit ? '' : 'guest-only';
            const uploadHint = canEdit ? ' Klik untuk tukar foto' : '';
            const uploadHint2 = canEdit ? '📷 Klik untuk tambah foto' : '';

            let avatarHTML = '';
            if (m.foto_url) {
                avatarHTML = `<img src="${m.foto_url}" alt="${m.nama}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='${initial}'">
                              ${canEdit ? `<div class="upload-hint">${uploadHint}</div>` : ''}`;
            } else {
                avatarHTML = `${initial}${canEdit ? `<div class="upload-hint">${uploadHint2}</div>` : ''}`;
            }

            const lencana = Array.isArray(m.lencana) ? m.lencana : [];

            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <div class="modal-avatar ${avatarClass}" ${canEdit ? 'onclick="triggerUpload()"' : ''}>${avatarHTML}</div>
                    <div class="modal-name">${m.nama}</div>
                    <div class="modal-class">${m.kelas}</div>
                    <div style="margin-top: 10px;"><span class="rank-badge rank-${rank.class}">${rank.name}</span></div>
                    ${!canEdit ? '<div style="margin-top:8px;font-size:0.75em;color:#888;">🔒 Login untuk edit</div>' : ''}
                </div>
                
                <div style="margin: 20px 0;">
                    <h3 style="color: var(--gold); font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">🌌 Galaxy Bintang</h3>
                    ${renderGalaxy(m.bintang)}
                </div>

                <div class="modal-stats">
                    <div class="modal-stat"><div class="modal-stat-value">${m.peratus}%</div><div class="modal-stat-label">Hafazan</div></div>
                    <div class="modal-stat"><div class="modal-stat-value" style="color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5);">⭐ ${m.bintang}</div><div class="modal-stat-label">Jumlah Bintang</div></div>
                    <div class="modal-stat"><div class="modal-stat-value">🔥 ${m.streak}</div><div class="modal-stat-label">Streak</div></div>
                </div>
                <div style="background: #0f1318; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center;">
                    <div style="color: #888; font-size: 0.85em;">Ayat Dihafaz Terkini</div>
                    <div style="color: var(--gold); font-size: 1.2em; font-weight: bold; margin-top: 5px;">📖 ${formatSurahAyat(m)}</div>
                </div>
                <div class="badges-section">
                    <h3>🏅 Lencana Diperoleh</h3>
                    <div class="badges-list">${lencana.map(l => `<div class="badge-item">${l}</div>`).join('')}</div>
                </div>
                <button class="btn-action btn-add-star ${actionBtnClass}" onclick="tambahBintang()">➕ Tambah 1 Bintang</button>
                <button class="btn-action btn-streak ${actionBtnClass}" onclick="tambahStreak()">🔥 Tambah Streak</button>
                ${m.foto_url && canEdit ? `<button class="btn-action btn-delete" onclick="hapusFoto()">🗑️ Padam Foto</button>` : ''}
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            currentModalIndex = null;
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') closeModal();
        });

        // ===== UPLOAD FOTO =====
        function triggerUpload() {
            if (!isLoggedIn) {
                showToast('🔒 Sila login untuk upload foto');
                showLoginModal();
                return;
            }
            if (currentModalIndex !== null) fotoInput.click();
        }

        fotoInput.addEventListener('change', async (e) => {
            if (!isLoggedIn) {
                showToast('🔒 Sila login dahulu');
                return;
            }
            
            const file = e.target.files[0];
            if (!file || currentModalIndex === null) return;
            
            if (file.size > 2 * 1024 * 1024) {
                showToast('❌ Saiz fail terlalu besar! Maksimum 2MB.');
                return;
            }
            
            showLoading(true);
            const murid = muridData[currentModalIndex];
            
            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${murid.id}_${Date.now()}.${fileExt}`;
                
                const { error: uploadError } = await supabaseClient
                    .storage
                    .from(STORAGE_BUCKET)
                    .upload(fileName, file, { cacheControl: '3600', upsert: false });
                
                if (uploadError) throw uploadError;
                
                const { data: urlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
                const fotoUrl = urlData.publicUrl;
                
                const { error: dbError } = await supabaseClient
                    .from(TABLE_NAME)
                    .update({ foto_url: fotoUrl })
                    .eq('id', murid.id);
                
                if (dbError) throw dbError;
                
                muridData[currentModalIndex].foto_url = fotoUrl;
                showModal(currentModalIndex);
                applyFilters();
                showToast('✅ Foto berjaya dimuat naik');
                
            } catch (error) {
                console.error('Error upload foto:', error);
                showToast('❌ Gagal upload foto: ' + error.message);
            } finally {
                showLoading(false);
                fotoInput.value = '';
            }
        });

        // ===== HAPUS FOTO =====
        async function hapusFoto() {
            if (!isLoggedIn) {
                showToast('🔒 Sila login dahulu');
                return;
            }
            if (currentModalIndex === null || !confirm('Padam foto murid ini?')) return;
            
            showLoading(true);
            const murid = muridData[currentModalIndex];
            
            try {
                if (murid.foto_url) {
                    const filePath = murid.foto_url.split(`${STORAGE_BUCKET}/`)[1];
                    if (filePath) {
                        await supabaseClient.storage.from(STORAGE_BUCKET).remove([filePath]);
                    }
                }
                
                const { error } = await supabaseClient
                    .from(TABLE_NAME)
                    .update({ foto_url: null })
                    .eq('id', murid.id);
                
                if (error) throw error;
                
                muridData[currentModalIndex].foto_url = null;
                showModal(currentModalIndex);
                applyFilters();
                showToast('✅ Foto berjaya dipadam');
                
            } catch (error) {
                console.error('Error hapus foto:', error);
                showToast('❌ Gagal padam foto: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ===== TAMBAH BINTANG =====
        async function tambahBintang() {
            if (!isLoggedIn) {
                showToast('🔒 Sila login untuk tambah bintang');
                showLoginModal();
                return;
            }
            if (currentModalIndex === null) return;
            
            const murid = muridData[currentModalIndex];
            const newBintang = murid.bintang + 1;
            
            showLoading(true);
            try {
                const { error } = await supabaseClient
                    .from(TABLE_NAME)
                    .update({ bintang: newBintang })
                    .eq('id', murid.id);
                
                if (error) throw error;
                
                muridData[currentModalIndex].bintang = newBintang;
                showModal(currentModalIndex);
                applyFilters();
                renderStats();
                showToast('⭐ Bintang ditambah!');
                
            } catch (error) {
                console.error('Error update bintang:', error);
                showToast('❌ Gagal simpan bintang: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ===== TAMBAH STREAK =====
        async function tambahStreak() {
            if (!isLoggedIn) {
                showToast('🔒 Sila login untuk tambah streak');
                showLoginModal();
                return;
            }
            if (currentModalIndex === null) return;
            
            const murid = muridData[currentModalIndex];
            const today = new Date().toISOString().slice(0, 10);
            const lastDate = murid.tarikh ? new Date(murid.tarikh).toISOString().slice(0, 10) : null;
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
            
            let newStreak = murid.streak || 0;
            if (lastDate === today) {
                showToast('ℹ️ Streak sudah ditambah hari ini');
                return;
            } else if (lastDate === yesterday) {
                newStreak += 1;
            } else {
                newStreak = 1;
            }
            
            showLoading(true);
            try {
                const { error } = await supabaseClient
                    .from(TABLE_NAME)
                    .update({ streak: newStreak, tarikh: new Date().toISOString() })
                    .eq('id', murid.id);
                
                if (error) throw error;
                
                muridData[currentModalIndex].streak = newStreak;
                muridData[currentModalIndex].tarikh = new Date().toISOString();
                showModal(currentModalIndex);
                applyFilters();
                renderStats();
                showToast('🔥 Streak ditambah! (' + newStreak + ' hari)');
                
            } catch (error) {
                console.error('Error update streak:', error);
                showToast('❌ Gagal simpan streak: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ===== FILTER & SEARCH =====
        let currentRank = 'all';
        function applyFilters() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            let filtered = muridData.filter(m => 
                m.nama.toLowerCase().includes(search) || (m.kelas && m.kelas.toLowerCase().includes(search))
            );
            if (currentRank !== 'all') {
                filtered = filtered.filter(m => getRank(m.peratus).class === currentRank);
            }
            filtered.sort((a, b) => b.peratus - a.peratus);
            renderMurid(filtered);
        }

        document.getElementById('searchBox').addEventListener('input', applyFilters);
        document.getElementById('filterGroup').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentRank = e.target.dataset.rank;
                applyFilters();
            }
        });

        // ===== INIT =====
        checkAuth();
        loadMuridData();
        setupRealtime();
    </script>
</body>
</html>
